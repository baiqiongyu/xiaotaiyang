services:
  nginx:
    image: nginx:alpine
    container_name: sun-nginx
    ports:
      - "8091:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sun-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sun-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - sun-network

  mysql:
    image: mysql:8.0
    container_name: sun-mysql
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xiaotaiyang
      MYSQL_USER: sun
      MYSQL_PASSWORD: sun888
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - sun-network

volumes:
  mysql-data:

networks:
  sun-network:
    driver: bridge
